<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Float Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000 !important; width: 100%; height: 100%; overflow: hidden; }

  .float-box {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .float-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .controls {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 100;
    background: rgba(0,0,0,0.9);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #333;
  }

  .ctrl-btn {
    font-family: system-ui;
    font-size: 12px; font-weight: 700;
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: none;
    color: #ccc;
    cursor: pointer;
  }
  .ctrl-btn:hover { border-color: #ff4400; color: #ff4400; }

  .drop-zone {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: system-ui; font-weight: 700;
    color: #666;
    background: #000;
    z-index: 200;
  }
  .drop-zone .drop-main { font-size: 18px; letter-spacing: 2px; margin-bottom: 10px; }
  .drop-zone .drop-hint { font-size: 12px; color: #444; }
  .drop-zone.hidden { display: none; }

  .url-input {
    position: fixed; top: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.9);
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid #333;
  }
  .url-input input {
    width: 260px; padding: 6px 10px;
    border: 1px solid #333; border-radius: 6px;
    background: #111; color: #fff;
    font-family: system-ui; font-size: 12px;
    outline: none;
  }
  .url-input input:focus { border-color: #ff4400; }
  .url-input button {
    padding: 6px 10px; border: 1px solid #444;
    border-radius: 6px; background: none;
    color: #ccc; font-size: 12px; cursor: pointer;
  }
  .url-input.hidden { display: none; }

  /* Hint that fades out */
  .ui-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: system-ui; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 8px;
    z-index: 150;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>

<div class="drop-zone" id="dropZone">
  <div class="drop-main">Drop image, paste, or click to browse</div>
  <div class="drop-hint">Also accepts image URLs</div>
  <input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;" onchange="loadFile(this.files[0])">
</div>

<div class="url-input hidden" id="urlInput">
  <input type="text" id="imgUrl" placeholder="Paste image URL..." onkeydown="if(event.key==='Enter')loadUrl()">
  <button onclick="loadUrl()">Load</button>
</div>

<div class="float-box" id="floatBox" style="display:none;">
  <img id="floatImg" alt="">
</div>

<div class="controls" id="controls" style="display:none;">
  <button class="ctrl-btn" onclick="document.getElementById('urlInput').classList.toggle('hidden')">URL</button>
  <button class="ctrl-btn" onclick="newImage()">New</button>
  <button class="ctrl-btn" onclick="hideUI()">Hide UI</button>
</div>

<div class="ui-hint" id="uiHint" style="display:none;">Double-click to show controls</div>

<script>
var img = document.getElementById('floatImg');
var uiVisible = true;

function loadFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { showImage(e.target.result); };
  reader.readAsDataURL(file);
}

function loadUrl() {
  var url = document.getElementById('imgUrl').value.trim();
  if (url) showImage(url);
}

document.addEventListener('paste', function(e) {
  var items = e.clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      loadFile(items[i].getAsFile());
      return;
    }
  }
  var text = e.clipboardData.getData('text');
  if (text && (text.startsWith('http') || text.startsWith('data:'))) showImage(text);
});

document.getElementById('dropZone').addEventListener('dragover', function(e) { e.preventDefault(); });
document.getElementById('dropZone').addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});

function showImage(src) {
  img.src = src;
  document.getElementById('floatBox').style.display = 'flex';
  document.getElementById('dropZone').classList.add('hidden');
  document.getElementById('controls').style.display = '';
  uiVisible = true;
}

function newImage() {
  img.src = '';
  document.getElementById('floatBox').style.display = 'none';
  document.getElementById('dropZone').classList.remove('hidden');
  document.getElementById('controls').style.display = 'none';
  document.getElementById('urlInput').classList.add('hidden');
}

function hideUI() {
  document.getElementById('controls').style.display = 'none';
  document.getElementById('urlInput').classList.add('hidden');
  uiVisible = false;
  // Show hint briefly
  var hint = document.getElementById('uiHint');
  hint.style.display = 'block';
  hint.style.opacity = '1';
  setTimeout(function() { hint.style.opacity = '0'; }, 2000);
  setTimeout(function() { hint.style.display = 'none'; }, 3000);
}

document.addEventListener('dblclick', function() {
  if (!uiVisible && document.getElementById('floatBox').style.display !== 'none') {
    document.getElementById('controls').style.display = '';
    uiVisible = true;
  }
});
</script>
</body>
</html>
