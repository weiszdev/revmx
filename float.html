<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Float Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; }

  .float-box {
    position: fixed;
    top: 50px; left: 50px;
    width: 300px;
    min-width: 80px; min-height: 80px;
    border: 2px solid rgba(255,68,0,0.5);
    border-radius: 8px;
    background: #000;
    overflow: hidden;
    resize: both;
    cursor: move;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }

  .float-box img {
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
    display: block;
  }

  .controls {
    position: fixed;
    bottom: 10px; left: 10px;
    display: flex; gap: 6px;
    z-index: 100;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: system-ui;
    font-size: 12px; font-weight: 700;
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: rgba(0,0,0,0.85);
    color: #ccc;
    cursor: pointer;
  }
  .ctrl-btn:hover { border-color: #ff4400; color: #ff4400; }

  .drop-zone {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui; font-size: 18px; font-weight: 700;
    color: #666; letter-spacing: 2px;
    border: 3px dashed #333;
    background: rgba(0,0,0,0.95);
    z-index: 200;
  }
  .drop-zone.hidden { display: none; }

  .url-input {
    position: fixed; top: 10px; left: 10px;
    z-index: 100;
    display: flex; gap: 4px;
  }
  .url-input input {
    width: 260px; padding: 6px 10px;
    border: 1px solid #333; border-radius: 6px;
    background: rgba(0,0,0,0.9); color: #fff;
    font-family: system-ui; font-size: 12px;
    outline: none;
  }
  .url-input input:focus { border-color: #ff4400; }
  .url-input button {
    padding: 6px 10px; border: 1px solid #444;
    border-radius: 6px; background: rgba(0,0,0,0.9);
    color: #ccc; font-size: 12px; cursor: pointer;
  }
  .url-input.hidden { display: none; }
</style>
</head>
<body>

<!-- Drop zone (shown until image loaded) -->
<div class="drop-zone" id="dropZone">
  Drop an image here, paste from clipboard, or click to browse
  <input type="file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;" onchange="loadFile(this.files[0])">
</div>

<!-- URL input -->
<div class="url-input hidden" id="urlInput">
  <input type="text" id="imgUrl" placeholder="Paste image URL..." onkeydown="if(event.key==='Enter')loadUrl()">
  <button onclick="loadUrl()">Load</button>
</div>

<!-- Float box -->
<div class="float-box" id="floatBox" style="display:none;">
  <img id="floatImg" alt="">
</div>

<!-- Controls -->
<div class="controls" id="controls" style="display:none;">
  <button class="ctrl-btn" onclick="toggleBorder()">Border</button>
  <button class="ctrl-btn" onclick="toggleBg()">BG</button>
  <button class="ctrl-btn" onclick="resetSize()">Reset Size</button>
  <button class="ctrl-btn" onclick="document.getElementById('urlInput').classList.toggle('hidden')">URL</button>
  <button class="ctrl-btn" onclick="newImage()">New Image</button>
  <button class="ctrl-btn" onclick="toggleControls()">Hide UI</button>
</div>

<script>
var box = document.getElementById('floatBox');
var img = document.getElementById('floatImg');
var isDragging = false, dragX, dragY, startLeft, startTop;
var borderOn = true, bgBlack = true;
var origW = 300;

// Drag
box.addEventListener('mousedown', function(e) {
  if (e.offsetX > box.clientWidth - 18 && e.offsetY > box.clientHeight - 18) return; // resize handle
  isDragging = true;
  dragX = e.clientX; dragY = e.clientY;
  startLeft = box.offsetLeft; startTop = box.offsetTop;
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  box.style.left = (startLeft + e.clientX - dragX) + 'px';
  box.style.top = (startTop + e.clientY - dragY) + 'px';
});
document.addEventListener('mouseup', function() { isDragging = false; });

// Load from file
function loadFile(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { showImage(e.target.result); };
  reader.readAsDataURL(file);
}

// Load from URL
function loadUrl() {
  var url = document.getElementById('imgUrl').value.trim();
  if (url) showImage(url);
}

// Paste from clipboard
document.addEventListener('paste', function(e) {
  var items = e.clipboardData.items;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      loadFile(items[i].getAsFile());
      return;
    }
  }
  // Check for text URL
  var text = e.clipboardData.getData('text');
  if (text && (text.startsWith('http') || text.startsWith('data:'))) {
    showImage(text);
  }
});

// Drop
document.getElementById('dropZone').addEventListener('dragover', function(e) { e.preventDefault(); });
document.getElementById('dropZone').addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});

function showImage(src) {
  img.src = src;
  img.onload = function() {
    origW = Math.min(img.naturalWidth, 500);
    box.style.width = origW + 'px';
    box.style.height = 'auto';
  };
  box.style.display = 'block';
  document.getElementById('dropZone').classList.add('hidden');
  document.getElementById('controls').style.display = '';
}

function toggleBorder() {
  borderOn = !borderOn;
  box.style.border = borderOn ? '2px solid rgba(255,68,0,0.5)' : 'none';
}

function toggleBg() {
  bgBlack = !bgBlack;
  box.style.background = bgBlack ? '#000' : 'transparent';
}

function resetSize() {
  box.style.width = origW + 'px';
  box.style.height = 'auto';
}

function newImage() {
  img.src = '';
  box.style.display = 'none';
  document.getElementById('dropZone').classList.remove('hidden');
  document.getElementById('controls').style.display = 'none';
}

function toggleControls() {
  document.getElementById('controls').style.display = 'none';
  document.getElementById('urlInput').classList.add('hidden');
  // Double-click to bring controls back
}

// Double-click to show/hide controls
document.addEventListener('dblclick', function() {
  var c = document.getElementById('controls');
  c.style.display = c.style.display === 'none' ? '' : 'none';
});
</script>
</body>
</html>
