<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoMicX LIVE — Hangtown Motocross Classic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    background: #060606;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 14px 10px 10px;
    max-height: 750px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Header ── */
  .hdr {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .hdr-logo { width: 150px; height: auto; flex-shrink: 0; object-fit: contain; }
  .hdr-text { flex: 1; }
  .hdr-brand {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem; font-weight: 700;
    letter-spacing: 2px; color: #666;
    text-transform: uppercase;
  }
  .hdr-event {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem; font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #ff0000, #ff4400, #ffaa00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .hdr-loc {
    font-size: 0.8rem; font-weight: 700; color: #888;
  }
  .hdr-live {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: #ff0000;
    padding: 3px 8px;
    border: 1px solid rgba(255,0,0,0.4);
    border-radius: 4px;
    animation: livePulse 1.5s ease-in-out infinite;
    margin-top: 4px;
    display: inline-block;
  }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 4px rgba(255,0,0,0.3); }
    50% { box-shadow: 0 0 14px rgba(255,0,0,0.7); }
  }

  /* ── Countdown ── */
  .countdown {
    text-align: center;
    padding: 8px;
    margin-bottom: 6px;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    background: #0a0a0a;
  }
  .cd-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem; font-weight: 700;
    letter-spacing: 2px; color: #ff4400;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .cd-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.8rem; font-weight: 900;
    color: #fff; letter-spacing: 2px;
  }
  .cd-next {
    font-size: 0.75rem; color: #888; margin-top: 4px;
  }

  /* ── Moto Countdown ── */
  .moto-cd {
    text-align: center;
    padding: 10px;
    margin-bottom: 6px;
    border: 2px solid rgba(255,0,0,0.5);
    border-radius: 10px;
    background: linear-gradient(145deg, #1a0000, #120000);
    box-shadow: 0 0 20px rgba(255,0,0,0.1), inset 0 0 20px rgba(255,0,0,0.03);
    animation: motoPulse 2.5s ease-in-out infinite;
  }
  @keyframes motoPulse {
    0%, 100% { box-shadow: 0 0 15px rgba(255,0,0,0.08); }
    50% { box-shadow: 0 0 30px rgba(255,0,0,0.2), inset 0 0 20px rgba(255,0,0,0.05); }
  }
  .moto-cd-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem; font-weight: 900;
    letter-spacing: 2px; color: #ff0000;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .moto-cd-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem; font-weight: 900;
    color: #ff3333; letter-spacing: 2px;
  }
  .moto-cd-sub {
    font-size: 0.7rem; font-weight: 700; color: #888; margin-top: 2px;
  }
  .moto-cd.done { display: none; }
  .moto-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem; font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid #444;
    border-radius: 6px;
    background: none;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }
  .moto-btn:hover {
    border-color: #ff003c;
    color: #ff003c;
    box-shadow: 0 0 10px rgba(255,0,60,0.3);
  }
  .moto-btn.active {
    border-color: #ff003c;
    color: #ff003c;
    background: rgba(255,0,60,0.12);
    box-shadow: 0 0 16px rgba(255,0,60,0.4), inset 0 0 10px rgba(255,0,60,0.06);
    animation: neonPulse 1.5s ease-in-out infinite;
  }
  @keyframes neonPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(255,0,60,0.3); }
    50% { box-shadow: 0 0 24px rgba(255,0,60,0.6), inset 0 0 10px rgba(255,0,60,0.08); }
  }

  /* ── Stripe ── */
  #schedWrap {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  #schedWrap::-webkit-scrollbar { width: 3px; }
  #schedWrap::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .stripe {
    height: 3px;
    background: linear-gradient(90deg, #ff0000, #ff4400, #ffaa00, #ff4400, #ff0000);
    border-radius: 2px;
    margin-bottom: 8px;
  }

  /* ── Schedule ── */
  .sched-section {
    margin-bottom: 6px;
  }
  .sched-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    display: inline-block;
  }
  .sched-label.past { color: #555; background: rgba(255,255,255,0.03); }
  .sched-label.now { color: #ff0000; background: rgba(255,0,0,0.1); }
  .sched-label.upcoming { color: #ff4400; background: rgba(255,68,0,0.08); }

  .row {
    display: flex;
    align-items: flex-start;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 2px;
    transition: all 0.3s;
    font-size: 0.9rem;
    font-weight: 700;
    gap: 8px;
  }

  .row.past {
    opacity: 0.35;
  }
  .row.active {
    background: rgba(255,0,0,0.08);
    border: 1px solid rgba(255,0,0,0.3);
    box-shadow: 0 0 15px rgba(255,0,0,0.12), inset 0 0 20px rgba(255,0,0,0.04);
    animation: activeGlow 2s ease-in-out infinite;
    opacity: 1;
  }
  @keyframes activeGlow {
    0%, 100% { box-shadow: 0 0 10px rgba(255,0,0,0.1); }
    50% { box-shadow: 0 0 22px rgba(255,0,0,0.25), inset 0 0 20px rgba(255,0,0,0.06); }
  }
  .row.future {
    opacity: 0.7;
  }

  .row-time {
    flex-shrink: 0;
    width: 75px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; font-weight: 900;
    color: #888;
    padding-top: 2px;
  }
  .row.active .row-time { color: #ff4400; }

  .row-dot {
    flex-shrink: 0;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
  }
  .row.past .row-dot { background: #333; }
  .row.active .row-dot { background: #ff0000; box-shadow: 0 0 8px rgba(255,0,0,0.6); animation: dotPulse 1.5s infinite; }
  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(255,0,0,0.4); }
    50% { box-shadow: 0 0 12px rgba(255,0,0,0.8); }
  }
  .row.future .row-dot { background: #ff440044; }

  .row-name {
    flex: 1;
    color: #aaa;
    line-height: 1.3;
  }
  .row.active .row-name { color: #fff; font-weight: 700; }
  .row.past .row-name { color: #555; }

  .row-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 3px;
    flex-shrink: 0; margin-top: 2px;
  }
  .row.active .row-badge {
    background: rgba(255,0,0,0.2); color: #ff3333;
    border: 1px solid rgba(255,0,0,0.3);
  }
  .row.past .row-badge { display: none; }
  .row.future .row-badge { display: none; }

  /* ── Facebook QR ── */
  .fb-bar {
    margin-top: 8px;
    padding: 6px 10px;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .fb-qr { height: 160px; width: auto; border-radius: 4px; }
  .fb-text {
    flex: 1;
  }
  .fb-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    color: #4488ff; letter-spacing: 1px;
  }
  .fb-handle {
    font-size: 1.1rem; font-weight: 700; color: #888;
  }

  /* ── Merch Sponsor ── */
  .merch-bar {
    margin-top: 6px;
    padding: 8px 12px;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .merch-bar:hover { border-color: #ff440044; }
  .merch-left {
    display: flex; align-items: center; gap: 8px;
  }
  .merch-presented {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.45rem; font-weight: 700;
    letter-spacing: 2px; color: #555;
    text-transform: uppercase;
  }
  .merch-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    color: #ff4400; letter-spacing: 1px;
  }
  .merch-shop {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.5rem; font-weight: 700;
    letter-spacing: 1px; color: #888;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid #333;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-text">
      <div class="hdr-brand">Presented by MotoMicX</div>
      <div class="hdr-event">Hangtown MX</div>
      <div class="hdr-loc">Rancho Cordova, CA &bull; Rd 2</div>
      <div class="hdr-live" id="liveTag">LIVE</div>
    </div>
    <img src="https://res.cloudinary.com/dyq7rnjjw/image/upload/w_400,q_auto,f_auto/v1780715540/9D3AB9D1-117E-48EF-8FAC-4B259B8A7E66_wkxfio.png" class="hdr-logo" alt="MotoMicX">
  </div>

  <!-- Countdown (hidden for now) -->
  <div class="countdown" id="cdBox" style="display:none;">
    <div class="cd-label" id="cdLabel">Next Up</div>
    <div class="cd-time" id="cdTime">--:--:--</div>
    <div class="cd-next" id="cdNext"></div>
  </div>

  <!-- Moto Timer (manual) -->
  <div class="moto-cd" id="motoCd">
    <div class="moto-cd-label" id="motoLabel">Moto Timer</div>
    <div class="moto-cd-time" id="motoCdTime">--:--</div>
    <div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
      <button class="moto-btn" onclick="dropGate(0)">250 M1</button>
      <button class="moto-btn" onclick="dropGate(1)">450 M1</button>
      <button class="moto-btn" onclick="dropGate(2)">250 M2</button>
      <button class="moto-btn" onclick="dropGate(3)">450 M2</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:4px;align-items:center;justify-content:center;">
      <label style="font-family:'Orbitron',sans-serif;font-size:0.45rem;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;">Delay (min):</label>
      <input id="delayInput" type="number" value="0" min="-60" max="120" step="5" style="width:50px;padding:4px 6px;border:1px solid #333;border-radius:4px;background:#0a0a0a;color:#ff003c;font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:900;text-align:center;outline:none;" onchange="applyDelay()">
      <button onclick="applyDelay()" style="font-family:'Orbitron',sans-serif;font-size:0.45rem;font-weight:700;letter-spacing:1px;padding:4px 8px;border:1px solid #333;border-radius:4px;background:none;color:#888;cursor:pointer;text-transform:uppercase;">Apply</button>
    </div>
  </div>

  <div id="peacockBanner" style="text-align:center;padding:4px 8px;margin-bottom:6px;font-family:'Orbitron',sans-serif;font-size:0.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;display:none;">Race Day Live on Peacock</div>

  <div class="stripe"></div>

  <!-- Schedule Container -->
  <div id="schedWrap"></div>

  <!-- Facebook QR -->
  <a class="fb-bar" href="https://facebook.com/MotoMicX" target="_blank">
    <img src="img-fb-qr.png" class="fb-qr" alt="Facebook QR">
    <div class="fb-text">
      <div class="fb-label">Add Us on Facebook</div>
      <div class="fb-handle">facebook.com/MotoMicX</div>
    </div>
  </a>

  <!-- Merch Sponsor -->
  <a class="merch-bar" href="https://merchjockey.com" target="_blank">
    <div class="merch-left">
      <div>
        <div class="merch-presented">Gear By</div>
        <div class="merch-name">MerchJockey</div>
        <div style="font-size:0.65rem; color:#666; font-weight:700;">MerchJockey.com</div>
      </div>
    </div>
    <div class="merch-shop">Shop Now</div>
  </a>

</div>

<script>
// All times in PDT (UTC-7) — Hangtown local time
var SCHEDULE = [
  { time: '2026-06-06T07:15:00-07:00', end: '2026-06-06T07:30:00-07:00', name: 'Riders Meeting at AMA Semi' },
  { time: '2026-06-06T07:30:00-07:00', end: '2026-06-06T07:45:00-07:00', name: 'Chapel Service at AMA Semi' },
  { time: '2026-06-06T08:00:00-07:00', end: '2026-06-06T08:15:00-07:00', name: '250 Class Practice Grp B', cat: 'practice' },
  { time: '2026-06-06T08:20:00-07:00', end: '2026-06-06T08:35:00-07:00', name: '250 Class Practice Grp A', cat: 'practice' },
  { time: '2026-06-06T08:35:00-07:00', end: '2026-06-06T08:50:00-07:00', name: 'Track Maintenance' },
  { time: '2026-06-06T08:50:00-07:00', end: '2026-06-06T09:05:00-07:00', name: '450 Class Practice Grp A', cat: 'practice' },
  { time: '2026-06-06T09:10:00-07:00', end: '2026-06-06T09:25:00-07:00', name: '450 Class Practice Grp B', cat: 'practice' },
  { time: '2026-06-06T09:30:00-07:00', end: '2026-06-06T09:45:00-07:00', name: 'Track Maintenance' },
  { time: '2026-06-06T09:45:00-07:00', end: '2026-06-06T10:00:00-07:00', name: '250 Class Qualifying', cat: 'qualifying' },
  { time: '2026-06-06T10:05:00-07:00', end: '2026-06-06T10:20:00-07:00', name: '450 Class Qualifying', cat: 'qualifying' },
  { time: '2026-06-06T10:30:00-07:00', end: '2026-06-06T11:00:00-07:00', name: 'WMX Moto', cat: 'race' },
  { time: '2026-06-06T11:00:00-07:00', end: '2026-06-06T11:30:00-07:00', name: 'Track Prep / Fan Activities' },
  { time: '2026-06-06T11:55:00-07:00', end: '2026-06-06T12:25:00-07:00', name: 'Opening Ceremonies', cat: 'ceremony' },
  { time: '2026-06-06T12:41:00-07:00', end: '2026-06-06T13:41:00-07:00', name: '250 Moto 1', cat: 'race' },
  { time: '2026-06-06T13:50:00-07:00', end: '2026-06-06T14:25:00-07:00', name: '450 Moto 1', cat: 'race' },
  { time: '2026-06-06T14:25:00-07:00', end: '2026-06-06T14:50:00-07:00', name: 'Track Maintenance' },
  { time: '2026-06-06T14:50:00-07:00', end: '2026-06-06T15:25:00-07:00', name: '250 Moto 2', cat: 'race' },
  { time: '2026-06-06T15:35:00-07:00', end: '2026-06-06T16:10:00-07:00', name: '450 Moto 2', cat: 'race' }
];

function formatTime(iso) {
  var d = new Date(iso);
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
}

function getLocalTimeLabel() {
  try {
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    var parts = tz.split('/');
    return parts[parts.length - 1].replace(/_/g, ' ');
  } catch(e) { return 'Local'; }
}

function render() {
  var now = new Date();
  var wrap = document.getElementById('schedWrap');
  var pastRows = [], activeHTML = '', futureHTML = '';
  var activeItem = null, nextItem = null;
  var futureCount = 0;

  for (var i = 0; i < SCHEDULE.length; i++) {
    var s = SCHEDULE[i];
    var start = new Date(new Date(s.time).getTime() + getDelayMs());
    var end = new Date(new Date(s.end).getTime() + getDelayMs());
    var localTime = formatTime(s.time);
    var status;

    if (now >= end) {
      status = 'past';
    } else if (now >= start && now < end) {
      status = 'active';
      // If there's already an active item, demote the previous one to past
      if (activeItem) {
        var prevRow = '<div class="row past"><div class="row-time">' + formatTime(activeItem.time) + '</div><div class="row-dot"></div><div class="row-name">' + activeItem.name + '</div></div>';
        pastRows.push(prevRow);
      }
      activeItem = s;
    } else {
      status = 'future';
      if (!nextItem) nextItem = s;
    }

    var badge = status === 'active' ? '<div class="row-badge">LIVE</div>' : '';
    var row = '<div class="row ' + status + '">' +
      '<div class="row-time">' + localTime + '</div>' +
      '<div class="row-dot"></div>' +
      '<div class="row-name">' + s.name + '</div>' +
      badge +
      '</div>';

    if (status === 'past') pastRows.push(row);
    else if (status === 'active') activeHTML = row;
    else { futureCount++; if (futureCount <= 3) futureHTML += row; }
  }

  // Only show last 2 completed events
  var recentPast = pastRows.slice(-2).join('');

  var html = '';
  if (recentPast) html += '<div class="sched-section"><div class="sched-label past">Completed</div>' + recentPast + '</div>';
  if (activeHTML) html += '<div class="sched-section"><div class="sched-label now">Happening Now</div>' + activeHTML + '</div>';
  if (futureHTML) html += '<div class="sched-section"><div class="sched-label upcoming">Up Next' + (futureCount > 3 ? ' (+' + (futureCount - 3) + ' more)' : '') + '</div>' + futureHTML + '</div>';

  wrap.innerHTML = html;

  // Countdown
  var cdBox = document.getElementById('cdBox');
  var cdLabel = document.getElementById('cdLabel');
  var cdTime = document.getElementById('cdTime');
  var cdNext = document.getElementById('cdNext');
  var liveTag = document.getElementById('liveTag');

  if (activeItem) {
    var remaining = new Date(activeItem.end) - now;
    var rm = Math.floor(remaining / 60000);
    var rs = Math.floor((remaining % 60000) / 1000);
    cdLabel.textContent = 'Live Now';
    cdTime.textContent = rm + ':' + (rs < 10 ? '0' : '') + rs;
    cdNext.textContent = activeItem.name + ' — remaining';
    cdBox.style.borderColor = 'rgba(255,0,0,0.3)';
    liveTag.style.display = '';
  } else if (nextItem) {
    var diff = new Date(nextItem.time) - now;
    if (diff < 0) diff = 0;
    var h = Math.floor(diff / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    cdLabel.textContent = 'Next Up';
    cdTime.textContent = (h > 0 ? h + ':' : '') + (m < 10 && h > 0 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    cdNext.textContent = nextItem.name + ' — ' + formatTime(nextItem.time) + ' ' + getLocalTimeLabel();
    cdBox.style.borderColor = '#1a1a1a';
    liveTag.style.display = 'none';
  } else {
    cdLabel.textContent = 'Race Complete';
    cdTime.textContent = 'FINAL';
    cdNext.textContent = 'Hangtown Motocross Classic — Results on RevMX.com';
    cdBox.style.borderColor = '#1a1a1a';
    liveTag.textContent = 'FINAL';
    liveTag.style.animation = 'none';
    liveTag.style.color = '#888';
    liveTag.style.borderColor = '#333';
  }

  // Manual moto timer
  updateMotoTimer();

  // Peacock banner: show during broadcast window
  var peacockStart = new Date('2026-06-06T10:00:00-07:00');
  var peacockEnd = new Date('2026-06-06T16:30:00-07:00');
  var pb = document.getElementById('peacockBanner');
  pb.style.display = (now >= peacockStart && now < peacockEnd) ? 'block' : 'none';

  // Auto-scroll active into view
  var activeRow = document.querySelector('.row.active');
  if (activeRow) activeRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Delay Offset ──
var delayMinutes = parseInt(localStorage.getItem('mmx_delay') || '0');
document.getElementById('delayInput').value = delayMinutes;

function applyDelay() {
  delayMinutes = parseInt(document.getElementById('delayInput').value) || 0;
  localStorage.setItem('mmx_delay', delayMinutes);
  render();
}

function getDelayMs() { return delayMinutes * 60 * 1000; }

// ── Manual Moto Timer ──
var MOTOS = ['250 Moto 1', '450 Moto 1', '250 Moto 2', '450 Moto 2'];
var MOTO_DURATION = 25 * 60 * 1000 + 30 * 1000;
var motoDropTime = parseInt(localStorage.getItem('mmx_motoDrop') || '0');
var currentMotoIdx = parseInt(localStorage.getItem('mmx_motoIdx') || '-1');

function dropGate(idx) {
  currentMotoIdx = idx;
  motoDropTime = Date.now();
  localStorage.setItem('mmx_motoIdx', idx);
  localStorage.setItem('mmx_motoDrop', motoDropTime);
  highlightBtns();
}

function highlightBtns() {
  var btns = document.querySelectorAll('.moto-btn');
  btns.forEach(function(b, i) {
    b.classList.toggle('active', i === currentMotoIdx);
  });
}

function updateMotoTimer() {
  var label = document.getElementById('motoLabel');
  var timer = document.getElementById('motoCdTime');

  if (currentMotoIdx < 0 || !motoDropTime) {
    label.textContent = 'Tap a Moto to Start';
    timer.textContent = '25:30';
    timer.style.color = '#ff003c';
    return;
  }

  label.textContent = MOTOS[currentMotoIdx];
  var elapsed = Date.now() - motoDropTime;
  var remaining = MOTO_DURATION - elapsed;

  if (remaining > 0) {
    // Counting down
    var m = Math.floor(remaining / 60000);
    var s = Math.floor((remaining % 60000) / 1000);
    timer.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    timer.style.color = m < 3 ? '#ff0000' : '#ffffff';
  } else {
    // Past zero — show negative time (+ 2 laps)
    var over = Math.abs(remaining);
    var om = Math.floor(over / 60000);
    var os = Math.floor((over % 60000) / 1000);
    timer.textContent = '-' + om + ':' + (os < 10 ? '0' : '') + os;
    timer.style.color = '#ffaa00';
    label.textContent = MOTOS[currentMotoIdx] + ' (+2 Laps)';
  }
}

highlightBtns();

render();
setInterval(render, 1000);
</script>
</body>
